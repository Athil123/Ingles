<style>
  .hr-directory {
    --accent: #E35336;
    --bg: #F5F5DC;
    --panel-bg: #FFFFFF;
    --text-dark: #2B2420;
    --text-muted: #7A7268;
    font-family: "72", "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    padding: 24px 20px 48px;
    box-sizing: border-box;
  }
  .hr-directory * { box-sizing: border-box; }

  .hr-breadcrumb {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.03em;
    margin-bottom: 18px;
  }
  .hr-breadcrumb span { color: var(--accent); font-weight: 600; }

  .hr-hero {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .hr-hero-text { flex: 1 1 320px; min-width: 260px; }
  .hr-hero-text h1 {
    font-size: 34px;
    line-height: 1.15;
    margin: 0 0 12px;
    color: var(--text-dark);
    font-weight: 800;
  }
  .hr-hero-text h1 .accent { color: var(--accent); }
  .hr-hero-text p {
    font-size: 14.5px;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 420px;
    margin: 0;
  }

  .hr-head-card {
    flex: 1 1 320px;
    max-width: 420px;
    border: 1.5px solid var(--accent);
    border-radius: 14px;
    background: var(--panel-bg);
    padding: 18px 20px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
    position: relative;
  }
  .hr-head-badge {
    position: absolute;
    top: -12px;
    left: 20px;
    background: var(--accent);
    color: #fff;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .hr-head-avatar {
    width: 64px;
    height: 64px;
    border-radius: 10px;
    background: #EEEBE4;
    border: 1px solid #E0DACD;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--accent);
  }
  .hr-head-info { padding-top: 4px; }
  .hr-head-info .name { font-size: 17px; font-weight: 700; color: var(--text-dark); }
  .hr-head-info .title { font-size: 12.5px; color: var(--accent); font-weight: 600; margin: 2px 0 8px; }
  .hr-head-info .contact { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; margin-top: 3px; }

  .hr-panel {
    border: 1.5px solid var(--accent);
    border-radius: 16px;
    background: var(--panel-bg);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .hr-panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    border-bottom: 1px solid #F1D9D2;
  }
  .hr-panel-header .icon {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #FCEDE9;
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .hr-panel-header h2 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-dark);
    margin: 0;
  }

  .hr-member-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 18px 20px;
    padding: 18px 20px;
  }
  .hr-member .name { font-size: 13.5px; font-weight: 700; color: var(--text-dark); line-height: 1.3; }
  .hr-member .title { font-size: 11.5px; color: var(--text-muted); margin: 2px 0 6px; line-height: 1.3; }
  .hr-member .row {
    font-size: 11.5px;
    color: var(--text-dark);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }
  .hr-member .row a { color: var(--text-dark); text-decoration: none; }
  .hr-member .row a:hover { color: var(--accent); text-decoration: underline; }
  .hr-member .row svg { flex-shrink: 0; }

  @media (max-width: 600px) {
    .hr-hero { flex-direction: column; }
    .hr-hero-text h1 { font-size: 26px; }
  }
</style>
