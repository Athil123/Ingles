<style>
  /* ============================================================
     DESIGN TOKENS
     ============================================================ */
  .hr-directory {
    --accent: #E35336;
    --accent-soft: #FDECE8;
    --bg: #F5F5DC;
    --surface: #FFFFFF;
    --border: #E8E4D9;
    --border-strong: #E0DACD;
    --text-dark: #22201C;
    --text-muted: #7A7268;
    --text-faint: #9A9388;
    --radius-lg: 18px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --shadow-sm: 0 1px 3px rgba(30, 20, 10, 0.06);
    --shadow-md: 0 6px 18px rgba(30, 20, 10, 0.08);
    --shadow-hover: 0 12px 30px rgba(30, 20, 10, 0.10);
    --space-1: 6px;
    --space-2: 12px;
    --space-3: 20px;
    --space-4: 32px;
    --space-5: 48px;

    font-family: "72", -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    padding: var(--space-4) var(--space-3) var(--space-5);
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
  }
  .hr-directory * { box-sizing: border-box; }

  /* ============================================================
     BREADCRUMB
     ============================================================ */
  .hr-breadcrumb {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    margin-bottom: var(--space-3);
  }
  .hr-breadcrumb span { color: var(--accent); font-weight: 600; }

  /* ============================================================
     HERO — CSS GRID: heading left, department head card right
     ============================================================ */
  .hr-hero {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: var(--space-5);
    align-items: center;
    margin-bottom: var(--space-5);
  }
  .hr-hero-text h1 {
    font-size: 36px;
    line-height: 1.15;
    margin: 0 0 var(--space-2);
    color: var(--text-dark);
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .hr-hero-text h1 .accent { color: var(--accent); }
  .hr-hero-text p {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.65;
    max-width: 440px;
    margin: 0;
  }

  /* ---- Department head: premium executive profile card ---- */
  .hr-head-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    border: 1px solid var(--border);
    padding: var(--space-4) var(--space-4) var(--space-3);
    position: relative;
  }
  .hr-head-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: var(--space-3);
  }
  .hr-head-body {
    display: flex;
    gap: var(--space-3);
    align-items: center;
  }
  .hr-head-photo {
    width: 96px;
    height: 96px;
    border-radius: var(--radius-md);
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    background: #EEEBE4;
  }
  .hr-head-info .name { font-size: 20px; font-weight: 700; color: var(--text-dark); letter-spacing: -0.01em; }
  .hr-head-info .title { font-size: 13px; color: var(--accent); font-weight: 600; margin: 3px 0 12px; }
  .hr-head-info .contact {
    font-size: 12.5px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 7px;
    margin-top: 6px;
  }
  .hr-head-info .contact a { color: var(--text-muted); text-decoration: none; }
  .hr-head-info .contact a:hover { color: var(--accent); text-decoration: underline; }
  .hr-head-info .contact svg { flex-shrink: 0; color: var(--accent); }

  /* ============================================================
     TEAM PANELS — light, low-weight enterprise cards
     ============================================================ */
  .hr-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    margin-bottom: var(--space-4);
    overflow: hidden;
  }
  .hr-panel-header {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-3) var(--space-4);
    border-bottom: 1px solid var(--border);
  }
  .hr-panel-header .icon {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .hr-panel-header .heading { display: flex; flex-direction: column; }
  .hr-panel-header h2 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-dark);
    margin: 0;
    letter-spacing: -0.005em;
  }
  .hr-panel-header .count {
    font-size: 11.5px;
    color: var(--text-faint);
    font-weight: 600;
    margin-top: 1px;
  }

  /* ---- Employee grid: 5 / 4 / 2 / 1 responsive columns ---- */
  .hr-member-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: var(--space-3);
    padding: var(--space-4);
  }
  @media (min-width: 1400px) { .hr-member-grid { grid-template-columns: repeat(5, 1fr); } }
  @media (min-width: 1100px) and (max-width: 1399px) { .hr-member-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 700px) and (max-width: 1099px) { .hr-member-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 699px) { .hr-member-grid { grid-template-columns: 1fr; } }

  /* ---- Employee card: horizontal media-card layout ---- */
  .hr-member {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-2) var(--space-2) var(--space-2) var(--space-2);
    box-shadow: var(--shadow-sm);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .hr-member:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-hover);
  }
  .hr-member-photo {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    background: #EEEBE4;
  }
  @media (max-width: 1099px) { .hr-member-photo { width: 56px; height: 56px; } }
  @media (max-width: 699px) { .hr-member-photo { width: 52px; height: 52px; } }

  .hr-member-info { min-width: 0; }
  .hr-member-info .name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-dark);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .hr-member-info .title {
    font-size: 12.5px;
    color: var(--text-muted);
    line-height: 1.4;
    margin: 2px 0 7px;
  }
  .hr-member-info .row {
    font-size: 12px;
    color: var(--text-dark);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 3px;
  }
  .hr-member-info .row a { color: var(--text-dark); text-decoration: none; }
  .hr-member-info .row a:hover { color: var(--accent); text-decoration: underline; }
  .hr-member-info .row svg { flex-shrink: 0; color: var(--accent); }

  /* ============================================================
     RESPONSIVE — HERO
     ============================================================ */
  @media (max-width: 900px) {
    .hr-hero { grid-template-columns: 1fr; }
    .hr-hero-text h1 { font-size: 28px; }
  }
</style>

  var phoneIcon = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';
  var mailIcon = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z" opacity="0"/><path d="M22 6l-10 7L2 6"/><rect x="2" y="4" width="20" height="16" rx="2"/></svg>';
  var teamIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6"/><circle cx="17" cy="9" r="2.5"/><path d="M22 20c0-2.6-2-4.8-4.7-5.6"/></svg>';

  // Inline SVG fallback used when a photo path 404s (keeps the widget
  // fully self-contained -- no external asset required to look correct
  // before real employee photos are uploaded to images/hr/).
  var FALLBACK_AVATAR_DATA_URI =
    'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">' +
        '<rect width="96" height="96" fill="#EEEBE4"/>' +
        '<circle cx="48" cy="38" r="16" fill="#C9C2B4"/>' +
        '<path d="M16 88c0-19 14-32 32-32s32 13 32 32" fill="#C9C2B4"/>' +
      '</svg>'
    );

  function escapeHtml(s) {
    return String(s || "").replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function onErrorFallback() {
    return 'this.onerror=null;this.src=\'' + FALLBACK_AVATAR_DATA_URI + '\';';
  }

  function memberCard(m) {
    var photoSrc = escapeHtml(m.photo || DEFAULT_AVATAR);
    var emailRow = m.email
      ? '<div class="row">' + mailIcon + '<a href="mailto:' + escapeHtml(m.email) + '">' + escapeHtml(m.email) + '</a></div>'
      : "";
    return (
      '<div class="hr-member">' +
        '<img class="hr-member-photo" src="' + photoSrc + '" alt="' + escapeHtml(m.name) + '" onerror="' + onErrorFallback() + '" />' +
        '<div class="hr-member-info">' +
          '<div class="name">' + escapeHtml(m.name) + '</div>' +
          '<div class="title">' + escapeHtml(m.title) + '</div>' +
          '<div class="row">' + phoneIcon + '<span>Ext. ' + escapeHtml(m.ext) + '</span></div>' +
          emailRow +
        '</div>' +
      '</div>'
    );
  }

  function teamPanel(team) {
    var cards = team.members.map(memberCard).join("");
    return (
      '<div class="hr-panel">' +
        '<div class="hr-panel-header">' +
          '<div class="icon">' + teamIcon + '</div>' +
          '<div class="heading">' +
            '<h2>' + escapeHtml(team.teamName) + '</h2>' +
            '<div class="count">' + team.members.length + ' Member' + (team.members.length === 1 ? '' : 's') + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="hr-member-grid">' + cards + '</div>' +
      '</div>'
    );
  }

  function renderDirectory(data) {
    var headPhoto = document.getElementById("head-photo");
    headPhoto.src = data.departmentHead.photo || DEFAULT_AVATAR;
    headPhoto.setAttribute("onerror", onErrorFallback());

    document.getElementById("head-name").textContent = data.departmentHead.name;
    document.getElementById("head-title").textContent = data.departmentHead.title;
    document.getElementById("head-ext").innerHTML = phoneIcon + " <span>Ext. " + escapeHtml(data.departmentHead.ext) + "</span>";
    document.getElementById("head-email").innerHTML = mailIcon + ' <a href="mailto:' + escapeHtml(data.departmentHead.email) + '">' + escapeHtml(data.departmentHead.email) + "</a>";

    var container = document.getElementById("hr-teams");
    container.innerHTML = data.teams.map(teamPanel).join("");
  }

  renderDirectory(directoryData);
})();
</script>
